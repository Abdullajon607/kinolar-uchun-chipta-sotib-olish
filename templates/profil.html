{% extends 'base.html' %}
{% block title %}Cyber-Kino | Mening Profilim{% endblock %}

{% block content %}
<main class="pt-32 pb-20 px-4 md:px-6 max-w-3xl mx-auto flex-grow w-full">
    <div class="glass-card rounded-3xl p-8 shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-neutral-700/50">
        
        <div class="flex items-center gap-6 mb-10 border-b border-neutral-700/50 pb-8">
            <img class="w-24 h-24 rounded-full shadow-[0_0_20px_rgba(75,142,255,0.4)]" src="https://ui-avatars.com/api/?name={{ user.username }}&background=4b8eff&color=fff&size=128" alt="Avatar">
            <div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight">{{ user.username }}</h1>
                <p class="text-neutral-400 mt-1">Shaxsiy ma'lumotlarni tahrirlash</p>
            </div>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-[11px] uppercase tracking-widest text-neutral-500 font-bold mb-2 block">Ism</label>
                    <input type="text" name="first_name" value="{{ user.first_name }}" class="w-full bg-[#151525] border border-neutral-600 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                </div>
                <div>
                    <label class="text-[11px] uppercase tracking-widest text-neutral-500 font-bold mb-2 block">Familiya</label>
                    <input type="text" name="last_name" value="{{ user.last_name }}" class="w-full bg-[#151525] border border-neutral-600 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                </div>
            </div>

            <div>
                <label class="text-[11px] uppercase tracking-widest text-neutral-500 font-bold mb-2 block">Email manzil</label>
                <input type="email" name="email" value="{{ user.email }}" class="w-full bg-[#151525] border border-neutral-600 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
            </div>

            <div class="pt-6 border-t border-neutral-700/50">
                <label class="text-[11px] uppercase tracking-widest text-neutral-500 font-bold mb-2 block">Yangi Parol (O'zgartirish niyati bo'lsa)</label>
                <input type="password" name="new_password" placeholder="Yangi parolni kiriting (kamida 8 belgi)" class="w-full bg-[#151525] border border-neutral-600 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                <p class="text-xs text-neutral-500 mt-2">Parolni o'zgartirishni istamasangiz, bu joyni bo'sh qoldiring.</p>
            </div>

            <div class="pt-6">
                <button type="submit" class="w-full py-4 bg-primary text-on-primary-container font-extrabold text-lg rounded-2xl hover:brightness-110 transition-all shadow-[0_0_20px_rgba(75,142,255,0.3)]">
                    O'zgarishlarni Saqlash
                </button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
